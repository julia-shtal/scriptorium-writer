appId: com.scriptorium-writer.app
productName: Scriptorium Writer
copyright: Copyright © 2026 Julia Shtal

directories:
  buildResources: build
  output: release

# Compiled output from electron-vite (main / preload / renderer) plus the
# manifest. resources/ (icons, dictionaries) are bundled via extraResources below.
files:
  - out/**/*
  - package.json

# Offline spellcheck dictionaries (M4). Copied to <resourcesPath>/resources/ so the
# packaged app resolves them the same way dev does (see dictionariesDir in main/index.ts).
extraResources:
  - from: resources
    to: resources

win:
  target:
    - nsis
  icon: resources/icons/icon.ico

# Per-user install; no code signing in v1 (tracked as a follow-up in M9).
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
